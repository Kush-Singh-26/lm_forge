# experiments/hf_native_example/config.yaml
experiment:
  name: "hf_native_example"

model:
  vocab_size: 32000
  hidden_size: 512
  num_layers: 6
  max_seq_len: 1024
  attention:
    type: "gqa"
    num_heads: 8
    num_kv_heads: 2
  positional:
    type: "rope"
  ffn:
    type: "swiglu"
  norm:
    type: "rms"

training:
  max_steps: 1000
  batch_size: 4
  grad_accum: 2
  lr: 3.0e-4
  dtype: "bfloat16"
  save_every: 100
  log_every: 10

hub:
  repo_id: "Kush26/lm-forge-native-test"
  use_hub_checkpoints: true
  checkpoint_limit: 2
  push_every: 100
  private: true
