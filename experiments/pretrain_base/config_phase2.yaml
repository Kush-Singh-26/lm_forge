# experiments/pretrain_base/config_phase2.yaml
#
# Phase 2: Continue pretraining on Code (the-stack-v2)
# Target: ~10B tokens, ~38,000 steps

experiment:
  name: "pretrain_phase2"

model:
  vocab_size: 49152
  hidden_size: 768
  num_layers: 20
  max_seq_len: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 0

  attention:
    type: "gqa"
    num_heads: 8
    num_kv_heads: 2
    dropout: 0.0

  positional:
    type: "rope"
    theta: 10000.0

  ffn:
    type: "swiglu"
    intermediate_size: 2048
    dropout: 0.0
    bias: false

  norm:
    type: "rms"
    eps: 1.0e-5

  initializer_range: 0.02

training:
  max_steps: 38000
  batch_size: 32
  grad_accum: 8
  seq_len: 1024
  lr: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  dtype: "bfloat16"
  backend: "auto"
  log_every: 10
  eval_every: 1000
  save_every: 1000
  compile: false
  fused_adamw: true
  num_workers: -1
  pin_memory: true

  # HF-specific overrides
  hf_args:
    report_to: ["wandb"]
    run_name: "pretrain_phase2"
    save_total_limit: 2
    optim: "adamw_torch_fused"
    lr_scheduler_type: "cosine"
    warmup_steps: 2000
    dataloader_drop_last: true
    gradient_checkpointing: true
    seed: 42

hub:
  repo_id: "Kush26/lm-forge-160m"
  use_hub_checkpoints: true
  checkpoint_limit: 2
  push_every: 1000
  private: true
