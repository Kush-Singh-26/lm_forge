# experiments/pretrain_base/config_phase2.yaml
#
# Phase 2: Continue pretraining on the-stack-v2 (code & syntax)
# Target: ~5-10B tokens, ~19,000-38,000 steps
# Starts from Phase 1 checkpoint with reduced learning rate
#
# Usage:
#   python experiments/pretrain_base/train.py --phase 2 --resume checkpoints/pretrain_phase1/checkpoint-XXXXX
#   python experiments/pretrain_base/train.py --phase 2 --resume <path> --t4

experiment:
  name: "pretrain_phase2"

model:
  vocab_size: 49152          # SmolLM tokenizer (trained on FineWeb-edu + code mix)
  hidden_size: 512
  num_layers: 16
  max_seq_len: 1024
  tie_word_embeddings: true

  attention:
    type: "gqa"
    num_heads: 8
    num_kv_heads: 2
    dropout: 0.0

  positional:
    type: "rope"
    theta: 10000.0

  ffn:
    type: "swiglu"
    intermediate_size: 1536
    dropout: 0.0
    bias: false

  norm:
    type: "rms"
    eps: 1.0e-5

  initializer_range: 0.02

training:
  max_steps: 38000
  batch_size: 32
  grad_accum: 8
  seq_len: 1024
  lr: 1.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  dtype: "bfloat16"
  backend: "auto"
  log_every: 10
  eval_every: 1000
  save_every: 1000
  compile: false
  fused_adamw: true
  num_workers: -1
  pin_memory: true

  # HF-specific overrides
  hf_args:
    report_to: ["none"]
    run_name: "pretrain_phase2"
    save_total_limit: 5
    optim: "adamw_torch_fused"
    lr_scheduler_type: "cosine"
    warmup_steps: 1000
    dataloader_drop_last: true
    gradient_checkpointing: true
    seed: 42

  data_hub_repo: ""
  data_dir: ""

hub:
  repo_id: ""
  push_every: 0
  private: true
