# experiments/exp_001_gqa_rope/config.yaml
experiment:
  name: "exp_001_gqa_rope"

model:
  vocab_size: 32000
  hidden_size: 512
  num_layers: 12
  max_seq_len: 2048
  attention:
    type: "gqa"
    num_heads: 8
    num_kv_heads: 2
  positional:
    type: "rope"
  ffn:
    type: "swiglu"
  norm:
    type: "rms"

training:
  max_steps: 5000
  batch_size: 8
  grad_accum: 4
  lr: 3.0e-4
  dtype: "bfloat16"
  save_every: 500
  log_every: 50

hub:
  repo_id: "Kush26/lm-forge-exp001"
  use_hub_checkpoints: true
  checkpoint_limit: 2
  push_every: 500
  private: true
